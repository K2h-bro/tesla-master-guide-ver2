<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tesla Consulting System</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#111; color:white; font-family:system-ui;}
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px);}
.neon:hover { box-shadow:0 0 20px #00F0FF; transform:translateY(-5px);}
</style>
</head>

<body>

<!-- HEADER -->
<div class="p-6 text-xl font-bold text-red-500">Tesla Consulting</div>

<!-- PRODUCT -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 px-6">

<button onclick="add('틴팅 VEGA',500000)" class="glass p-4 rounded neon">틴팅 VEGA</button>
<button onclick="add('블랙박스 SB-350',300000)" class="glass p-4 rounded neon">블랙박스 SB-350</button>
<button onclick="add('하이패스',150000)" class="glass p-4 rounded neon">하이패스</button>
<button onclick="add('실내 악세서리',200000)" class="glass p-4 rounded neon">실내 악세서리</button>

</div>

<!-- CART -->
<div class="fixed right-0 top-0 w-80 h-full bg-black p-4 overflow-y-auto">

<h2 class="text-xl mb-4">견적</h2>

<div id="cart"></div>

<div id="total" class="mt-4 text-cyan-400 font-bold"></div>

<input id="name" placeholder="고객명" class="w-full p-2 mt-4 bg-gray-800 rounded">
<input id="phone" placeholder="연락처" class="w-full p-2 mt-2 bg-gray-800 rounded">

<button onclick="generatePDF()" class="w-full bg-cyan-400 text-black mt-4 p-2 rounded">
PDF 견적서 생성
</button>

<button onclick="checkout()" class="w-full bg-red-500 mt-2 p-2 rounded">
결제하기
</button>

</div>

<script>

let cart = [];

function add(name, price){
  cart.push({name, price});
  render();
}

function render(){
  const el = document.getElementById("cart");

  if(cart.length === 0){
    el.innerHTML = "<p class='text-gray-400'>선택된 항목 없음</p>";
  } else {
    el.innerHTML = cart.map((i,idx)=>`
      <div class="flex justify-between border-b border-gray-700 py-1">
        <span>${i.name}</span>
        <span>₩${i.price.toLocaleString()}</span>
      </div>
    `).join("");
  }

  const total = cart.reduce((a,b)=>a+b.price,0);

  document.getElementById("total").innerText =
    "총합: ₩" + total.toLocaleString();
}

async function checkout(){

  if(cart.length === 0){
    alert("상품을 먼저 선택하세요");
    return;
  }

  alert("⚠️ 현재 GitHub Pages에서는 결제가 불가능합니다.\n서버(Render) 연결 후 사용하세요.");
}

function generatePDF(){

  if(cart.length === 0){
    alert("상품을 먼저 선택하세요");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  doc.text("Tesla 견적서", 10, y);
  y += 10;

  const name = document.getElementById("name").value || "-";
  const phone = document.getElementById("phone").value || "-";

  doc.text("고객명: " + name, 10, y);
  y += 10;
  doc.text("연락처: " + phone, 10, y);
  y += 10;

  cart.forEach(i=>{
    doc.text(`${i.name} - ₩${i.price.toLocaleString()}`, 10, y);
    y += 10;
  });

  const total = cart.reduce((a,b)=>a+b.price,0);

  doc.text("총합: ₩" + total.toLocaleString(), 10, y+10);

  doc.save("Tesla_견적서.pdf");
}

render();

</script>

</body>
</html>
