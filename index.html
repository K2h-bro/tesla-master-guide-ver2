<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tesla Consulting</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family: system-ui;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}

.neon {
  transition: all 0.3s ease;
}

.neon:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(0,240,255,0.4);
}

.fade {
  opacity:0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

.show {
  opacity:1;
  transform: none;
}

.tesla-red {
  color:#E82127;
}

.tesla-cyan {
  color:#00F0FF;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="flex justify-between items-center px-6 py-5 glass sticky top-0 z-50">
  <div class="text-xl font-bold tesla-red">Tesla Consulting</div>
  <div class="text-sm text-gray-400">Premium Package Advisor</div>
</div>

<!-- HERO -->
<section class="text-center py-16 fade">
  <h1 class="text-3xl md:text-5xl font-bold mb-4">
    테슬라를 완성하는 프리미엄 패키지
  </h1>
  <p class="text-gray-400">
    상담과 동시에 견적을 완성하세요
  </p>
</section>

<!-- PRODUCTS -->
<section class="px-6 pb-20">
  <h2 class="mb-6 text-xl tesla-cyan">패키지 선택</h2>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-6">

    <div onclick="add('틴팅 VEGA',500000)" class="glass p-5 rounded neon cursor-pointer">
      <h3 class="font-bold mb-2">틴팅 VEGA</h3>
      <p class="text-gray-400 text-sm">프리미엄 비반사 필름</p>
      <p class="mt-2 tesla-cyan">₩500,000</p>
    </div>

    <div onclick="add('블랙박스 SB-350',300000)" class="glass p-5 rounded neon cursor-pointer">
      <h3 class="font-bold mb-2">블랙박스</h3>
      <p class="text-gray-400 text-sm">고성능 녹화 시스템</p>
      <p class="mt-2 tesla-cyan">₩300,000</p>
    </div>

    <div onclick="add('하이패스',150000)" class="glass p-5 rounded neon cursor-pointer">
      <h3 class="font-bold mb-2">하이패스</h3>
      <p class="text-gray-400 text-sm">RF 프리미엄 단말기</p>
      <p class="mt-2 tesla-cyan">₩150,000</p>
    </div>

    <div onclick="add('실내 악세서리',200000)" class="glass p-5 rounded neon cursor-pointer">
      <h3 class="font-bold mb-2">실내 악세서리</h3>
      <p class="text-gray-400 text-sm">인테리어 업그레이드</p>
      <p class="mt-2 tesla-cyan">₩200,000</p>
    </div>

  </div>
</section>

<!-- CART -->
<div class="fixed right-0 top-0 w-80 h-full glass p-6 overflow-y-auto">

<h2 class="text-xl mb-4 tesla-cyan">실시간 견적</h2>

<div id="cart" class="space-y-2"></div>

<div id="total" class="mt-6 text-lg font-bold"></div>

<div class="mt-6 space-y-2">
  <input id="name" placeholder="고객명"
    class="w-full p-2 bg-black border border-gray-700 rounded">
  <input id="phone" placeholder="연락처"
    class="w-full p-2 bg-black border border-gray-700 rounded">
</div>

<button onclick="generatePDF()"
  class="w-full mt-6 bg-[#E82127] py-3 rounded font-bold hover:opacity-80">
  견적서 PDF 저장
</button>

</div>

<script>

let cart = [];

function add(name, price){
  cart.push({name, price});
  render();
}

function render(){
  const el = document.getElementById("cart");

  if(cart.length === 0){
    el.innerHTML = "<p class='text-gray-500'>선택된 항목 없음</p>";
  } else {
    el.innerHTML = cart.map((i,idx)=>`
      <div class="flex justify-between border-b border-gray-800 pb-1">
        <span>${i.name}</span>
        <span class="tesla-cyan">₩${i.price.toLocaleString()}</span>
      </div>
    `).join("");
  }

  const total = cart.reduce((a,b)=>a+b.price,0);

  document.getElementById("total").innerText =
    "총합: ₩" + total.toLocaleString();
}

function generatePDF(){

  if(cart.length === 0){
    alert("상품을 선택하세요");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  doc.setFontSize(16);
  doc.text("Tesla Premium 견적서", 10, y);

  y += 10;

  const name = document.getElementById("name").value || "-";
  const phone = document.getElementById("phone").value || "-";

  doc.setFontSize(12);
  doc.text("고객명: " + name, 10, y);
  y += 8;
  doc.text("연락처: " + phone, 10, y);
  y += 10;

  cart.forEach(i=>{
    doc.text(`${i.name} - ₩${i.price.toLocaleString()}`, 10, y);
    y += 8;
  });

  const total = cart.reduce((a,b)=>a+b.price,0);

  doc.text("총합: ₩" + total.toLocaleString(), 10, y+5);

  doc.save("Tesla_견적서.pdf");
}

// 애니메이션
setTimeout(()=>{
  document.querySelectorAll(".fade").forEach(e=>e.classList.add("show"));
},200);

render();

</script>

</body>
</html>
