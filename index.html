<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tesla Vibe</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { background:#050505; color:white; font-family:system-ui;}
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(14px);}
.card:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,240,255,0.15);}
</style>
</head>

<body>

<!-- HERO -->
<section class="text-center py-20">
<h1 class="text-4xl font-bold mb-4">Tesla Lifestyle Platform</h1>
<p class="text-gray-400">실시간 알리익스프레스 + 더 스미스 패키지</p>
</section>

<!-- CATEGORY -->
<div class="flex gap-4 justify-center mb-10">
<button onclick="load('interior')">실내</button>
<button onclick="load('exterior')">외장</button>
<button onclick="load('lighting')">조명</button>
<button onclick="load('storage')">수납</button>
<button onclick="load('protection')">보호</button>
</div>

<!-- GRID -->
<div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 px-6"></div>

<!-- CART -->
<div class="fixed right-0 top-0 w-80 h-full bg-black p-6">
<h2>견적</h2>
<div id="cart"></div>
<div id="total"></div>
<button onclick="generatePDF()" class="bg-red-500 w-full py-2 mt-4">PDF</button>
</div>

<script>

let cart=[]

async function load(category){

  const res = await fetch(`https://너서버주소/api/products?category=${category}`);
  const data = await res.json();

  document.getElementById("grid").innerHTML =
    data.map(p=>`
      <div class="glass p-4 rounded card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>

        <div class="flex gap-2 mt-2">
          <button onclick="add('${p.name}',${parseInt(p.price)})"
          class="bg-white text-black px-2 py-1">담기</button>

          <a href="${p.link}" target="_blank"
          class="border px-2 py-1">Ali</a>
        </div>
      </div>
    `).join("")
}

function add(name,price){
  cart.push({name,price})
  render()
}

function render(){
  document.getElementById("cart").innerHTML =
    cart.map(i=>`<p>${i.name} ₩${i.price}</p>`).join("")

  const total=cart.reduce((a,b)=>a+b.price,0)
  document.getElementById("total").innerText="₩"+total
}

function generatePDF(){
  html2pdf().from(document.getElementById("cart")).save()
}

load("interior")

</script>

</body>
</html>
